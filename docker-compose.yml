name: ${COMPOSE_PROJECT_NAME:-arq-tickets}

services:
  postgres-catalog:
    image: postgres:16-alpine
    container_name: postgres-catalog
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_CATALOG_USER:-catalog}
      POSTGRES_PASSWORD: ${POSTGRES_CATALOG_PASSWORD:-catalog_secret}
      POSTGRES_DB: ${POSTGRES_CATALOG_DB:-catalog_db}
    ports:
      - "5434:5432"
    volumes:
      - postgres_catalog_data:/var/lib/postgresql/data
    networks:
      - ticket-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-sales:
    image: postgres:16-alpine
    container_name: postgres-sales
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_SALES_USER:-sales}
      POSTGRES_PASSWORD: ${POSTGRES_SALES_PASSWORD:-sales_secret}
      POSTGRES_DB: ${POSTGRES_SALES_DB:-sales_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_sales_data:/var/lib/postgresql/data
    networks:
      - ticket-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  catalog-service:
    build:
      context: ./catalog-service
      dockerfile: Dockerfile
    container_name: catalog-service
    env_file:
      - .env
    environment:
      POSTGRES_CATALOG_USER: ${POSTGRES_CATALOG_USER:-catalog}
      POSTGRES_CATALOG_PASSWORD: ${POSTGRES_CATALOG_PASSWORD:-catalog_secret}
      POSTGRES_CATALOG_DB: ${POSTGRES_CATALOG_DB:-catalog_db}
      POSTGRES_CATALOG_HOST: postgres-catalog
      API_KEY: ${CATALOG_API_KEY:-dev-shared-key-change-me}
    ports:
      - "8000:8000"
    depends_on:
      postgres-catalog:
        condition: service_healthy
    networks:
      - ticket-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  sales-service:
    build:
      context: ./sales-service
      dockerfile: Dockerfile
    container_name: sales-service
    env_file:
      - .env
    environment:
      DB_DATABASE: ${POSTGRES_SALES_DB:-sales_db}
      DB_USERNAME: ${POSTGRES_SALES_USER:-sales}
      DB_PASSWORD: ${POSTGRES_SALES_PASSWORD:-sales_secret}
      CATALOG_API_KEY: ${CATALOG_API_KEY:-dev-shared-key-change-me}
    ports:
      - "8080:8080"
    depends_on:
      postgres-sales:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
    networks:
      - ticket-net
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "exit(file_get_contents('http://127.0.0.1:8080/api/health') ? 0 : 1);",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SALES_API_URL: ${VITE_SALES_API_URL:-http://localhost:8080}
    container_name: frontend
    env_file:
      - .env
    environment:
      VITE_SALES_API_URL: ${VITE_SALES_API_URL:-http://localhost:8080}
    ports:
      - "5173:5173"
    depends_on:
      sales-service:
        condition: service_healthy
    networks:
      - ticket-net

networks:
  ticket-net:
    driver: bridge

volumes:
  postgres_catalog_data:
  postgres_sales_data:
